<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>wrapper-codex · dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { color-scheme: light dark; }
  body { font: 14px/1.45 ui-sans-serif, system-ui, sans-serif;
         margin: 0; padding: 0; background: #f7f7f4; color: #202124; }
  body.dark { background: #1c1b1a; color: #e6e4e1; }
  header { padding: 16px 24px; border-bottom: 1px solid #d8d8d2;
           background: #fff; display: flex; align-items: center; gap: 16px; }
  body.dark header { background: #232220; border-color: #3a3936; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .pill { padding: 2px 8px; border-radius: 999px; font-size: 12px;
                 background: #e6f4ea; color: #1e6e3a; }
  header .pill.busy { background: #fde7e9; color: #b3261e; }
  header .pill.idle { background: #e8eaed; color: #5f6368; }
  header .spacer { flex: 1; }
  button { background: #f1f3f4; border: 1px solid #d8d8d2; padding: 6px 12px;
           border-radius: 6px; cursor: pointer; font-size: 12px; }
  button:hover { background: #e8eaed; }
  body.dark button { background: #2e2c2a; border-color: #444240; color: #e6e4e1; }
  main { max-width: 1200px; margin: 0 auto; padding: 24px; }
  section { margin: 18px 0; padding: 16px; border: 1px solid #d8d8d2;
            border-radius: 8px; background: #fff; }
  body.dark section { background: #232220; border-color: #3a3936; }
  section h2 { margin: 0 0 12px; font-size: 14px; font-weight: 600;
               text-transform: uppercase; letter-spacing: 0.05em; color: #5f6368; }
  body.dark section h2 { color: #a8a6a3; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
          gap: 12px; }
  .stat { padding: 12px; border-radius: 6px; background: #f7f7f4;
          border: 1px solid #ececea; }
  body.dark .stat { background: #1c1b1a; border-color: #2e2c2a; }
  .stat .v { font-size: 22px; font-weight: 600; }
  .stat .l { font-size: 11px; color: #5f6368; text-transform: uppercase;
             letter-spacing: 0.05em; margin-top: 4px; }
  .row { display: flex; align-items: center; gap: 12px; padding: 8px 12px;
         border-bottom: 1px solid #ececea; font-size: 13px; }
  .row:last-child { border-bottom: 0; }
  body.dark .row { border-color: #2e2c2a; }
  .row .grow { flex: 1; }
  .badge { padding: 2px 8px; border-radius: 999px; font-size: 11px;
           font-weight: 500; }
  .badge.completed { background: #e6f4ea; color: #1e6e3a; }
  .badge.failed    { background: #fde7e9; color: #b3261e; }
  .badge.cancelled { background: #fef7e0; color: #8a6d00; }
  .badge.running   { background: #e8f0fe; color: #1a73e8; }
  body.dark .badge.completed { background: #2d4a37; color: #b7e1c4; }
  body.dark .badge.failed    { background: #4a2d2f; color: #f4b5b8; }
  body.dark .badge.cancelled { background: #4a4229; color: #e8d89e; }
  body.dark .badge.running   { background: #2c3e5a; color: #b1c5e8; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; font-weight: 500; color: #5f6368;
       border-bottom: 1px solid #ececea; font-size: 11px; text-transform: uppercase;
       letter-spacing: 0.05em; }
  body.dark th { color: #a8a6a3; border-color: #2e2c2a; }
  td { padding: 8px 12px; border-bottom: 1px solid #ececea; }
  body.dark td { border-color: #2e2c2a; }
  tr:last-child td { border-bottom: 0; }
  .chart { display: flex; align-items: flex-end; gap: 2px; height: 80px;
           padding: 8px 0; }
  .bar { flex: 1; background: #1a73e8; min-height: 1px; border-radius: 1px 1px 0 0;
         transition: opacity .2s; position: relative; }
  .bar.failed { background: #b3261e; }
  .bar.cancelled { background: #8a6d00; }
  .bar:hover { opacity: 0.7; }
  .legend { display: flex; gap: 16px; font-size: 11px; color: #5f6368; margin-top: 4px; }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .legend i { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  pre { white-space: pre-wrap; word-break: break-word; font-size: 12px;
        font-family: ui-monospace, monospace; margin: 0; }
  .empty { color: #5f6368; font-size: 13px; padding: 24px; text-align: center; }
  body.dark .empty { color: #a8a6a3; }
  .mono { font-family: ui-monospace, monospace; font-size: 12px; }
  .ts { color: #5f6368; font-size: 11px; }
</style>
</head>
<body>
<header>
  <h1>wrapper-codex</h1>
  <span id="status-pill" class="pill">…</span>
  <span class="ts" id="last-refresh"></span>
  <span class="spacer"></span>
  <button onclick="toggleTheme()">Theme</button>
  <button onclick="refreshAll()">Refresh</button>
  <button onclick="resetMetrics()">Reset data</button>
</header>
<main>
  <section>
    <h2>Health &amp; live pool</h2>
    <div class="grid" id="health-grid"></div>
  </section>

  <section>
    <h2>Summary · last 24h</h2>
    <div class="grid" id="metrics-grid"></div>
  </section>

  <section>
    <h2>Activity · last 24h (hourly)</h2>
    <div class="chart" id="chart-hourly"></div>
    <div class="legend">
      <span><i style="background:#1a73e8"></i> completed</span>
      <span><i style="background:#b3261e"></i> failed</span>
      <span><i style="background:#8a6d00"></i> cancelled</span>
    </div>
  </section>

  <section>
    <h2>Per-model breakdown</h2>
    <div id="models-table"></div>
  </section>

  <section>
    <h2>Recent runs</h2>
    <div id="recent-runs"></div>
  </section>

  <section>
    <h2>Active runs (live)</h2>
    <div id="active-runs"></div>
  </section>
</main>
<script>
const $ = (id) => document.getElementById(id);
const fmt = (n, suffix = "") => n == null ? "—" : (typeof n === "number"
  ? (n >= 1000 ? (n/1000).toFixed(1) + "k" : Math.round(n*10)/10) + suffix
  : n);

async function get(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(path + ": HTTP " + r.status);
  return r.json();
}

async function refreshAll() {
  try {
    const [health, metrics, hourly, models, recent, active] = await Promise.all([
      get("/health"),
      get("/metrics?window=24h"),
      get("/metrics/chart/hourly?hours=24"),
      get("/metrics/models?window=24h"),
      get("/metrics/recent?limit=20"),
      get("/stats"),
    ]);

    // Status pill
    const slot = health.available_slots;
    const pill = $("status-pill");
    pill.textContent = slot > 0 ? `${slot} slot${slot>1?"s":""} free` : "busy";
    pill.className = "pill " + (slot > 0 ? "" : "busy");

    // Health grid
    $("health-grid").innerHTML = `
      <div class="stat"><div class="v">${health.active_runs}</div><div class="l">active runs</div></div>
      <div class="stat"><div class="v">${health.available_slots}</div><div class="l">available slots</div></div>
      <div class="stat"><div class="v">${health.max_concurrent_runs}</div><div class="l">max concurrent</div></div>
      <div class="stat"><div class="v">${health.cli_bin}</div><div class="l">cli bin</div></div>
      <div class="stat"><div class="v">${health.version}</div><div class="l">version</div></div>
      <div class="stat"><div class="v">${health.port}</div><div class="l">port</div></div>
    `;

    // Metrics grid
    $("metrics-grid").innerHTML = `
      <div class="stat"><div class="v">${metrics.total_runs}</div><div class="l">total runs</div></div>
      <div class="stat"><div class="v">${metrics.completed}</div><div class="l">completed</div></div>
      <div class="stat"><div class="v">${metrics.failed}</div><div class="l">failed</div></div>
      <div class="stat"><div class="v">${metrics.cancelled}</div><div class="l">cancelled</div></div>
      <div class="stat"><div class="v">${metrics.success_rate}%</div><div class="l">success rate</div></div>
      <div class="stat"><div class="v">${fmt(metrics.avg_latency_ms,"ms")}</div><div class="l">avg latency</div></div>
      <div class="stat"><div class="v">${fmt(metrics.max_latency_ms,"ms")}</div><div class="l">max latency</div></div>
      <div class="stat"><div class="v">${fmt(metrics.final_text_chars)}</div><div class="l">final chars</div></div>
      <div class="stat"><div class="v">${metrics.req_per_hour}</div><div class="l">runs/hour</div></div>
      <div class="stat"><div class="v">${metrics.distinct_models}</div><div class="l">distinct models</div></div>
      <div class="stat"><div class="v">${metrics.distinct_cwds}</div><div class="l">distinct cwds</div></div>
    `;

    // Hourly chart
    const maxRuns = Math.max(1, ...hourly.data.map(d => d.runs || 0));
    $("chart-hourly").innerHTML = hourly.data.map(d => {
      const total = d.runs || 0;
      const h = total ? Math.max(2, total / maxRuns * 80) : 1;
      const fail = d.failed || 0, canc = d.cancelled || 0;
      const succ = Math.max(0, total - fail - canc);
      const failH = total ? fail / total * h : 0;
      const cancH = total ? canc / total * h : 0;
      const succH = h - failH - cancH;
      return `
        <div class="bar" style="height:${h}px; background:linear-gradient(to top,
            #b3261e 0%, #b3261e ${failH}px,
            #8a6d00 ${failH}px, #8a6d00 ${failH+cancH}px,
            #1a73e8 ${failH+cancH}px, #1a73e8 ${h}px)"
             title="${d.hour_ago}h ago: ${total} runs (${succ}✓ / ${fail}✗ / ${canc}⊘)"></div>
      `;
    }).join("");

    // Per-model table
    if (!models.models.length) {
      $("models-table").innerHTML = '<div class="empty">No runs recorded yet.</div>';
    } else {
      $("models-table").innerHTML = `
        <table>
          <thead><tr>
            <th>Model</th><th>Runs</th><th>Success</th><th>Failed</th><th>Cancelled</th>
            <th>Success rate</th><th>Avg latency</th><th>Output chars</th>
          </tr></thead>
          <tbody>
            ${models.models.map(m => `
              <tr>
                <td class="mono">${m.model || "(none)"}</td>
                <td>${m.runs}</td>
                <td>${m.completed}</td>
                <td>${m.failed}</td>
                <td>${m.cancelled}</td>
                <td>${m.success_rate}%</td>
                <td>${fmt(m.avg_latency_ms,"ms")}</td>
                <td>${fmt(m.output_chars)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    // Recent runs
    if (!recent.rows.length) {
      $("recent-runs").innerHTML = '<div class="empty">No runs recorded yet.</div>';
    } else {
      $("recent-runs").innerHTML = `
        <table>
          <thead><tr>
            <th>Time</th><th>Model</th><th>Status</th><th>Exit</th>
            <th>Latency</th><th>Final text</th><th>Run ID</th>
          </tr></thead>
          <tbody>
            ${recent.rows.map(r => `
              <tr>
                <td class="ts">${new Date(r.ts*1000).toLocaleTimeString()}</td>
                <td class="mono">${r.model || "(default)"}</td>
                <td><span class="badge ${r.status}">${r.status}</span></td>
                <td>${r.exit_code ?? "—"}</td>
                <td>${fmt(r.latency_ms,"ms")}</td>
                <td>${fmt(r.final_text_chars)} chars</td>
                <td class="mono ts">${(r.run_id||"").slice(0,8)}…</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    // Active runs
    const ar = active.runs || [];
    if (!ar.length) {
      $("active-runs").innerHTML = '<div class="empty">No active runs.</div>';
    } else {
      $("active-runs").innerHTML = ar.map(r => `
        <div class="row">
          <span class="badge ${r.status}">${r.status}</span>
          <span class="grow mono">${r.model || "(default)"}</span>
          <span class="ts">${r.duration_s}s · pid ${r.pid ?? "—"}</span>
          <button onclick="cancelRun('${r.run_id}')">Cancel</button>
        </div>
      `).join("");
    }

    $("last-refresh").textContent = "updated " + new Date().toLocaleTimeString();
  } catch (e) {
    console.error(e);
    $("status-pill").textContent = "ERROR";
    $("status-pill").className = "pill busy";
  }
}

async function cancelRun(runId) {
  if (!confirm("Cancel run " + runId + "?")) return;
  await fetch("/v1/runs/" + runId + "/cancel", { method: "POST" });
  setTimeout(refreshAll, 500);
}

async function resetMetrics() {
  if (!confirm("Wipe ALL recorded runs and events? This cannot be undone.")) return;
  await fetch("/metrics/reset", { method: "POST" });
  refreshAll();
}

function toggleTheme() {
  document.body.classList.toggle("dark");
  localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
}

if (localStorage.getItem("theme") === "dark") document.body.classList.add("dark");
refreshAll();
setInterval(refreshAll, 5000);
</script>
</body>
</html>
